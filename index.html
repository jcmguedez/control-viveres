<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#27ae60">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Control Víveres">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <title>Control de Víveres - Pro Contable v2</title>
    <style>
        :root { --primary: #27ae60; --secondary: #f39c12; --danger: #e74c3c; --warning: #e67e22; --info: #3498db; --bg: #f4f7f6; --card: #ffffff; --text: #2c3e50; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .app-card { background: var(--card); width: 100%; max-width: 500px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 20px; margin-bottom: 20px; }
        .header-info { background: linear-gradient(135deg, var(--primary), var(--info)); color: white; padding: 15px; border-radius: 15px; margin-bottom: 20px; text-align: center; cursor: pointer; }
        .header-info h2 { margin: 0 0 10px 0; font-size: 1.2rem; }
        .status-badge { display: inline-block; background: rgba(255,255,255,0.3); padding: 5px 15px; border-radius: 20px; font-size: 0.85rem; margin-top: 10px; }
        .connection-status { display: inline-block; margin-left: 10px; font-size: 0.75rem; padding: 3px 8px; border-radius: 10px; color: white; }
        .connection-status.online { background: #2ecc71; }
        .connection-status.offline { background: #e74c3c; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #eee; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { background: none; border: none; padding: 10px 15px; cursor: pointer; font-weight: 600; color: #999; border-bottom: 3px solid transparent; transition: all 0.3s; white-space: nowrap; }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        h2 { color: var(--text); font-size: 1.1rem; margin-top: 20px; margin-bottom: 15px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #555; font-size: 0.9rem; }
        input, select { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; font-size: 16px; outline: none; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        button { border: none; padding: 12px; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; font-size: 0.85rem; }
        .btn-add { background: var(--primary); }
        .btn-vender { background: var(--secondary); }
        .btn-danger { background: var(--danger); }
        .btn-info { background: var(--info); }
        .list-container { margin-top: 20px; max-height: 400px; overflow-y: auto; }
        .item { background: #f9f9f9; padding: 12px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid var(--primary); position: relative; }
        .item.alert { border-left-color: var(--danger); background: #fff5f5; }
        .stats-box { background: #f9f9f9; border-radius: 10px; padding: 15px; margin-bottom: 15px; border-left: 4px solid var(--info); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; padding: 10px; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; max-width: 450px; width: 100%; max-height: 90vh; overflow-y: auto; }
        .total-section { background: var(--primary); color: white; padding: 15px; border-radius: 15px; text-align: center; margin-top: 15px; }
        .total-amount { font-size: 1.8rem; font-weight: bold; }
        .switch-container { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; background: #f9f9f9; padding: 10px; border-radius: 10px; }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 2px; bottom: 2px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(20px); }
        .exento-badge { font-size: 0.6rem; background: #9b59b6; color: white; padding: 2px 5px; border-radius: 4px; margin-left: 5px; }
    </style>
</head>
<body>
<div class="app-card">
    <div class="header-info" onclick="toggleConfig()">
        <h2>📦 Control de Víveres - Pro Contable v2</h2>
        <p id="fechaActual"></p>
        <div style="display: flex; justify-content: center; gap: 10px; align-items: center;">
            <div class="status-badge" id="statusBadge">ABIERTO</div>
            <div class="connection-status" id="connectionStatus">🔴 Local</div>
        </div>
    </div>

    <div class="config-section" id="configSection" style="display:none; background:#eee; padding:15px; border-radius:10px; margin-bottom:15px;">
        <label>Project ID</label><input type="text" id="projectId" style="margin-bottom:10px;">
        <label>API Key</label><input type="password" id="apiKey" style="margin-bottom:10px;">
        <button class="btn-add" onclick="conectarFirebase()" style="width: 100%;">CONECTAR</button>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('inventario')">📦 Stock</button>
        <button class="tab-btn" onclick="switchTab('ventas')">🛒 Venta</button>
        <button class="tab-btn" onclick="switchTab('creditos')">💳 Créditos</button>
        <button class="tab-btn" onclick="switchTab('reportes')">📊 Reportes</button>
    </div>

    <div id="inventario" class="tab-content active">
        <div style="display:flex; gap:10px;">
            <div style="flex:1;"><label>Tasa $</label><input type="number" id="tasa" step="0.01" onchange="actualizarTasa()"></div>
            <div style="flex:1;"><label>Stock Mín</label><input type="number" id="stockMinimo" value="5" onchange="render()"></div>
        </div>
        <h2 id="formTitle">➕ Cargar Producto</h2>
        <input type="text" id="nombre" placeholder="Nombre" style="margin-bottom:10px; width:100%; padding:10px; border-radius:10px; border:1px solid #ccc;">
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <input type="number" id="costo" placeholder="Costo" style="flex:2;">
            <select id="monedaCosto" style="flex:1;"><option value="BS">Bs.</option><option value="USD">$</option></select>
        </div>
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <input type="number" id="beneficio" value="30" placeholder="%">
            <select id="unidad"><option value="UND">UND</option><option value="KG">KG</option></select>
            <input type="number" id="cantidad" value="1">
        </div>
        <button class="btn-add" onclick="addItem()" style="width:100%;">GUARDAR EN INVENTARIO</button>
        <div id="lista" class="list-container"></div>
    </div>

    <div id="ventas" class="tab-content">
        <input type="text" id="busquedaProducto" placeholder="🔍 Buscar..." oninput="buscarVenta()" style="width:100%; padding:10px; border-radius:10px; margin-bottom:10px;">
        <div id="searchResults" style="max-height:150px; overflow-y:auto; border:1px solid #eee;"></div>
        <div id="carritoContainer"></div>
        <div class="total-section">
            <div class="total-amount" id="totalCarrito">Bs. 0,00</div>
        </div>
        <div class="btn-grid">
            <button class="btn-vender" onclick="finalizarVenta(false)">✅ CONTADO</button>
            <button class="btn-info" onclick="abrirModalCredito()">💳 CRÉDITO</button>
        </div>
    </div>

    <div id="creditos" class="tab-content"><div id="listaCreditos"></div></div>
    <div id="reportes" class="tab-content">
        <div class="stats-box"><div>VENTAS HOY</div><div id="ingresosTotales" class="total-amount" style="color:var(--primary)">Bs. 0,00</div></div>
        <button class="btn-danger" onclick="cerrarDia()" style="width:100%;">CERRAR CAJA</button>
        <div id="historialCierres" class="list-container"></div>
    </div>
</div>

<div id="modalCredito" class="modal"><div class="modal-content">
    <h3>Registrar Crédito</h3>
    <input type="text" id="cedulaCliente" placeholder="Cédula" style="margin-bottom:10px;">
    <input type="text" id="nombreCliente" placeholder="Nombre" style="margin-bottom:10px;">
    <button class="btn-add" onclick="finalizarVenta(true)" style="width:100%;">CONFIRMAR</button>
    <button onclick="cerrarModalCredito()" style="width:100%; margin-top:10px; background:#ccc; border-radius:10px; padding:10px;">CANCELAR</button>
</div></div>
<script src="https://www.gstatic.com/firebasejs/8.8.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.8.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.8.1/firebase-auth.js"></script>

<script>
    let items = [], ventas = [], creditos = [], carrito = [], cierres = [], clientes = [];
    let tasaDolar = 36.50, diaActual = new Date().toLocaleDateString('es-ES'), db = null, firebaseConnected = false;

    function fM(n) { return new Intl.NumberFormat('de-DE', { minimumFractionDigits: 2 }).format(n); }

    function init() {
        items = JSON.parse(localStorage.getItem('v_items')) || [];
        ventas = JSON.parse(localStorage.getItem('v_ventas')) || [];
        creditos = JSON.parse(localStorage.getItem('v_creditos')) || [];
        cierres = JSON.parse(localStorage.getItem('v_cierres')) || [];
        tasaDolar = parseFloat(localStorage.getItem('v_tasa')) || 36.50;
        document.getElementById('tasa').value = tasaDolar;
        document.getElementById('fechaActual').textContent = diaActual;
        const config = localStorage.getItem('fb_config');
        if(config) { const c = JSON.parse(config); document.getElementById('projectId').value = c.projectId; document.getElementById('apiKey').value = c.apiKey; conectarFirebase(); }
        render();
    }

    function conectarFirebase() {
        const projectId = document.getElementById('projectId').value.trim();
        const apiKey = document.getElementById('apiKey').value.trim();
        if(!projectId || !apiKey) return;
        const config = { apiKey, projectId, databaseURL: `https://${projectId}-default-rtdb.firebaseio.com` };
        firebase.initializeApp(config);
        db = firebase.database();
        firebase.auth().signInAnonymously().then(() => {
            db.ref('.info/connected').on('value', s => { 
                firebaseConnected = s.val() === true;
                document.getElementById('connectionStatus').textContent = firebaseConnected ? '🟢 Sincronizado' : '🔴 Local';
            });
            db.ref('viveres_pro/data').on('value', s => { if(s.val()){ Object.assign(window, s.val()); render(); } });
        });
        localStorage.setItem('fb_config', JSON.stringify({projectId, apiKey}));
    }

    function sync() {
        localStorage.setItem('v_items', JSON.stringify(items));
        localStorage.setItem('v_ventas', JSON.stringify(ventas));
        if(firebaseConnected && db) db.ref('viveres_pro/data').set({ items, ventas, creditos, cierres, tasa: tasaDolar });
    }

    function addItem() {
        const n = document.getElementById('nombre').value;
        let c = parseFloat(document.getElementById('costo').value);
        const b = parseFloat(document.getElementById('beneficio').value);
        const q = parseFloat(document.getElementById('cantidad').value);
        if(document.getElementById('monedaCosto').value === 'BS') c /= tasaDolar;
        items.push({ id: Date.now(), nombre: n, costo: c, precioVenta: c * (1 + b/100), cantidad: q, unidad: document.getElementById('unidad').value });
        sync(); render();
    }

    function render() {
        document.getElementById('lista').innerHTML = items.map(i => `
            <div class="item"><b>${i.nombre}</b>: Bs. ${fM(i.precioVenta * tasaDolar)} <small>(${i.cantidad} ${i.unidad})</small></div>
        `).join('');
        renderCarrito();
    }

    function buscarVenta() {
        const q = document.getElementById('busquedaProducto').value.toLowerCase();
        document.getElementById('searchResults').innerHTML = items.filter(i => i.nombre.toLowerCase().includes(q)).map(i => `
            <div onclick="addCarrito(${i.id})" style="padding:10px; border-bottom:1px solid #eee; cursor:pointer;">${i.nombre}</div>
        `).join('');
    }

    function addCarrito(id) {
        const i = items.find(x => x.id === id);
        carrito.push({...i, q: 1});
        renderCarrito();
    }

    function renderCarrito() {
        let t = 0;
        document.getElementById('carritoContainer').innerHTML = carrito.map(i => {
            t += i.precioVenta * i.q * tasaDolar;
            return `<div>${i.nombre} x ${i.q}</div>`;
        }).join('');
        document.getElementById('totalCarrito').textContent = 'Bs. ' + fM(t);
    }

    function finalizarVenta(esCredito) {
        let t = 0, g = 0, det = "";
        carrito.forEach(c => {
            t += c.precioVenta * c.q * tasaDolar;
            g += (c.precioVenta - c.costo) * c.q * tasaDolar;
            items.find(x => x.id === c.id).cantidad -= c.q;
            det += c.nombre + ", ";
        });
        if(esCredito) creditos.push({ cliente: document.getElementById('nombreCliente').value, monto: t, fecha: diaActual });
        ventas.push({ total: t, ganancia: g, dia: diaActual });
        carrito = []; cerrarModalCredito(); sync(); render();
    }

    function switchTab(t) { document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active')); document.getElementById(t).classList.add('active'); }
    function toggleConfig() { const s = document.getElementById('configSection'); s.style.display = s.style.display === 'none' ? 'block' : 'none'; }
    function abrirModalCredito() { document.getElementById('modalCredito').classList.add('active'); }
    function cerrarModalCredito() { document.getElementById('modalCredito').classList.remove('active'); }
    
    init();
</script>
</body>
</html>
